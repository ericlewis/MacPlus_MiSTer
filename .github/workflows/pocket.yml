name: Build MacPlus Pocket Core
on:
  push:
    branches: [master, pocket]
    paths: ['pocket/**', 'rtl/**', 'pkg/**', '.github/workflows/pocket.yml']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ln -sf ../rtl pocket/rtl
      - run: |
          docker run --rm -v "${{ github.workspace }}:/build" -w /build/pocket \
            raetro/quartus:pocket quartus_sh --flow compile MacPlus_Pocket
      - run: |
          sudo chown -R runner:runner pocket/output_files/
          python3 pocket/reverse_bitstream.py \
            pocket/output_files/MacPlus_Pocket.rbf pocket/output_files/bitstream.rbf_r
      - run: |
          mkdir -p release/Cores/ericlewis.MacPlus release/Platforms
          cp pocket/output_files/bitstream.rbf_r release/Cores/ericlewis.MacPlus/
          cp pkg/Cores/ericlewis.MacPlus/*.json release/Cores/ericlewis.MacPlus/
          cp pkg/Platforms/mac.json release/Platforms/
      - uses: actions/upload-artifact@v4
        with:
          name: ericlewis.MacPlus-pocket
          path: release/
          retention-days: 30
